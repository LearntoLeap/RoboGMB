<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sa bàn · Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="display-page">
  <div id="display-root" class="display-root">
    <header class="d-header">
      <div class="arena-tag">Sa bàn <span id="arena-no">–</span></div>
      <div class="round-tag" id="round-tag">Vòng <span id="round-num">1</span> / <span id="round-total">13</span></div>
      <button id="btn-mute" class="mute-btn" title="Tắt/bật âm thanh">🔊</button>
    </header>

    <main class="d-split">
      <!-- LEFT: team info + selector -->
      <section class="d-pane d-team">
        <div class="team-hero">
          <div class="label">Đội đang thi đấu</div>
          <div class="team-name big" id="team-name">—</div>
          <div class="team-state" id="team-state"></div>
        </div>

        <div class="team-controls">
          <button id="btn-prev" class="btn btn-ghost btn-lg nav-btn">← Vòng trước</button>
          <button id="btn-list" class="btn btn-primary btn-lg">📋 Danh sách</button>
          <button id="btn-next" class="btn btn-ghost btn-lg nav-btn">Vòng sau →</button>
        </div>
        <div class="hotkey-hint">
          <kbd>←</kbd>/<kbd>→</kbd> chuyển vòng · <kbd>L</kbd> mở danh sách
        </div>
      </section>

      <!-- RIGHT: timer + controls -->
      <section class="d-pane d-timer">
        <div class="timer-hero">
          <div class="label">Thời gian</div>
          <div class="timer-big" id="timer-big">03:00</div>
          <div class="timer-state" id="timer-state">Sẵn sàng</div>
        </div>

        <div class="timer-controls-wrap">
          <div class="timer-set-row">
            <button class="btn btn-ghost btn-sm adj" data-adj="-30">−30s</button>
            <input type="text" id="timer-input" value="03:00" maxlength="5" />
            <button class="btn btn-ghost btn-sm adj" data-adj="30">+30s</button>
          </div>
          <div class="timer-actions">
            <button id="btn-toggle" class="btn btn-success btn-xl">▶ Bắt đầu</button>
            <button id="btn-reset" class="btn btn-ghost btn-xl">↺ Reset</button>
          </div>
          <div class="hotkey-hint">
            <kbd>Space</kbd> bắt đầu/dừng · <kbd>R</kbd> reset
          </div>
        </div>
      </section>
    </main>

    <footer class="d-footer">
      <span class="brand">Learn to Leap · RoboGMB</span>
    </footer>

    <!-- ===== Team list modal ===== -->
    <div id="team-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-box">
        <div class="modal-head">
          <h3>Sa bàn <span id="modal-arena">–</span> — Lịch thi đấu</h3>
          <button id="modal-close" class="modal-close">✕</button>
        </div>
        <ol id="team-list" class="team-list"></ol>
      </div>
    </div>

    <div id="fx-overlay" class="fx-overlay"></div>
    <div id="confetti-layer" class="confetti-layer"></div>
    <div id="countdown-overlay" class="countdown-overlay"></div>
    <div id="toast-stack" class="toast-stack"></div>
    <pre id="err-box" class="err-box hidden"></pre>
  </div>

  <script>
    window.addEventListener("error", (e) => {
      const box = document.getElementById("err-box");
      if (!box) return;
      box.classList.remove("hidden");
      box.textContent = `[JS ERROR] ${e.message}\n${e.filename}:${e.lineno}`;
    });
  </script>
  <script type="module" src="js/display.js?v=12"></script>
</body>
</html>
