<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sa bàn · Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="display-page">
  <div id="display-root" class="display-root">
    <header class="d-header">
      <div class="arena-tag">Sa bàn <span id="arena-no">–</span></div>
      <div class="round-tag" id="round-tag">Đang tải…</div>
      <span class="status-pill" id="status">connecting</span>
    </header>

    <main class="d-split">
      <!-- LEFT: team info -->
      <section class="d-pane d-team">
        <div id="view-scoring" class="view view-scoring hidden">
          <div class="label">Đội thi</div>
          <div class="team-name big" id="scoring-team">—</div>
        </div>

        <div id="view-knockout" class="view view-knockout hidden">
          <div class="ko-stack">
            <div class="ko-side">
              <div class="label">Đội 1</div>
              <div class="team-name" id="ko-team1">—</div>
            </div>
            <div class="vs">VS</div>
            <div class="ko-side">
              <div class="label">Đội 2</div>
              <div class="team-name" id="ko-team2">—</div>
            </div>
          </div>
        </div>

        <div id="view-empty" class="view view-empty">
          <div class="empty-text">Chờ ban tổ chức cập nhật…</div>
        </div>
      </section>

      <!-- RIGHT: timer + controls -->
      <section class="d-pane d-timer">
        <div class="timer-hero">
          <div class="label">Thời gian</div>
          <div class="timer-big" id="timer-big">03:00</div>
          <div class="timer-state" id="timer-state">Sẵn sàng</div>
        </div>

        <div class="timer-controls-wrap">
          <div class="timer-set-row">
            <button class="btn btn-ghost btn-sm adj" data-adj="-30">−30s</button>
            <input type="text" id="timer-input" value="03:00" maxlength="5" />
            <button class="btn btn-ghost btn-sm adj" data-adj="30">+30s</button>
          </div>
          <div class="timer-actions">
            <button id="btn-toggle" class="btn btn-success btn-xl">▶ Bắt đầu</button>
            <button id="btn-reset" class="btn btn-ghost btn-xl">↺ Reset</button>
          </div>
          <div class="hotkey-hint">
            <kbd>Space</kbd> bắt đầu/dừng · <kbd>R</kbd> reset
          </div>
        </div>
      </section>
    </main>

    <footer class="d-footer">
      <span class="brand">Learn to Leap · RoboGMB</span>
    </footer>

    <div id="fx-overlay" class="fx-overlay"></div>
    <pre id="err-box" class="err-box hidden"></pre>
  </div>

  <script>
    // Hiện lỗi JS trực tiếp lên màn hình (cho dễ debug khi không mở được F12)
    window.addEventListener("error", (e) => {
      const box = document.getElementById("err-box");
      if (!box) return;
      box.classList.remove("hidden");
      box.textContent = `[JS ERROR] ${e.message}\n${e.filename}:${e.lineno}`;
    });
    window.addEventListener("unhandledrejection", (e) => {
      const box = document.getElementById("err-box");
      if (!box) return;
      box.classList.remove("hidden");
      box.textContent = `[PROMISE] ${e.reason?.message || e.reason}`;
    });
  </script>
  <script type="module" src="js/display.js?v=9"></script>
</body>
</html>
