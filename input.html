<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Nhập đội thi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-page">
  <header class="topbar">
    <a href="index.html" class="back">← Trang chủ</a>
    <h1>Bảng điều khiển</h1>
    <span id="status" class="status connecting">Đang kết nối…</span>
  </header>

  <main class="admin-wrap">
    <!-- Round + Timer in 1 row -->
    <div class="row-2">
      <section class="card round-card">
        <h2>Vòng đấu</h2>
        <div class="round-toggle" role="tablist">
          <button id="btn-scoring" class="round-btn active" data-round="scoring">
            <span class="dot"></span> Vòng tính điểm
          </button>
          <button id="btn-knockout" class="round-btn" data-round="knockout">
            <span class="dot"></span> Vòng đối kháng
          </button>
        </div>
        <p class="hint">Áp dụng cho cả 4 màn hình sa bàn.</p>
      </section>

      <section class="card timer-card">
        <h2>Đồng hồ thi đấu</h2>
        <div class="timer-row">
          <div class="timer-display" id="timer-display">03:00</div>
          <div class="timer-set">
            <label>Đặt giờ (mm:ss)</label>
            <input type="text" id="timer-input" value="03:00" placeholder="03:00" maxlength="5" />
          </div>
        </div>
        <div class="timer-controls">
          <button id="btn-start" class="btn-primary sm">▶ Bắt đầu</button>
          <button id="btn-pause" class="btn-ghost sm" disabled>⏸ Tạm dừng</button>
          <button id="btn-reset" class="btn-ghost sm">↺ Reset</button>
        </div>
        <p class="hint">Thao tác đẩy lên màn hình ngay lập tức.</p>
      </section>
    </div>

    <section class="arenas-grid" id="arenas">
      <!-- 4 arena cards rendered by JS -->
    </section>

    <section class="card actions">
      <span id="dirty-flag" class="dirty-flag hidden">● Có thay đổi chưa đẩy</span>
      <button id="clear-all" class="btn-ghost">Xoá toàn bộ tên đội</button>
      <button id="publish" class="btn-primary" disabled>Đẩy lên màn hình hiển thị</button>
    </section>
  </main>

  <script type="module" src="js/input.js"></script>
</body>
</html>
